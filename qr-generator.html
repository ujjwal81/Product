<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<style>
body{
    margin:20px;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
h1{
    text-align:center;
    margin-bottom:20px;
}
.actions{
    text-align:center;
    margin-bottom:20px;
}
button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}
.category-section{
    margin-bottom:40px;
}
.category-title{
    font-size:22px;
    margin:0 0 15px 0;
    padding-bottom:8px;
    border-bottom:3px solid #333;
}
.category-nav{
    text-align:center;
    margin-bottom:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
}
.category-nav a{
    background:white;
    border:1px solid #ccc;
    border-radius:20px;
    padding:6px 14px;
    font-size:13px;
    text-decoration:none;
    color:#333;
}
.category-nav a:hover{
    background:#eee;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:320px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}
@media print{
    body{
        background:white;
        margin:0;
    }
    button,
    h1,
    .category-nav{
        display:none;
    }
    .grid{
        gap:10px;
    }
    .card{
        box-shadow:none;
        border:1px solid #ddd;
        break-inside:avoid;
        page-break-inside:avoid;
    }
    .category-section{
        break-before:page;
        page-break-before:always;
    }
    .category-section:first-of-type{
        break-before:auto;
        page-break-before:auto;
    }
}
</style>
</head>
<body>
<h1>Product QR Codes</h1>
<div class="actions">
    <button onclick="window.print()">Print QR Codes</button>
</div>
<div id="categoryNav" class="category-nav"></div>
<div id="container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>

// ====== GOOGLE SHEETS CONFIG ======
// Same sheet + tab as your product page (index.html).
// Keep these two in sync whenever you update index.html's config.

const SHEET_ID = "1fLroSPYKrZYq-BNCiAfdjO5d5nZjfsjmMZ_xzVruonM";
const SHEET_GID = "2135797386";

const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;

// Where your product page lives. Update this if the URL ever changes.
const PRODUCT_PAGE_URL = "https://ujjwal81.github.io/Product/";

// ====== END CONFIG ======

function parseCSV(csvText){
    const result = Papa.parse(csvText, {
        header:true,
        skipEmptyLines:true
    });
    return result.data;
}

async function fetchCSV(url){
    const response = await fetch(url + (url.includes("?") ? "&" : "?") + "cachebust=" + Date.now());
    if(!response.ok){
        throw new Error("Could not load sheet: " + url);
    }
    const text = await response.text();
    return parseCSV(text);
}

function slugify(text){
    return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

async function loadProducts(){

    try{

        const rows = await fetchCSV(SHEET_CSV_URL);
        const container = document.getElementById('container');
        const nav = document.getElementById('categoryNav');

        // Group rows by Category, preserving sheet order
        const categories = [];
        const categoryMap = {};

        rows.forEach(row => {

            const code = (row["Code"] || "").trim();
            const model = (row["Model"] || "").trim();
            const category = (row["Category"] || "").trim() || "Uncategorized";

            if(!code || !model) return;

            if(!categoryMap[category]){
                categoryMap[category] = [];
                categories.push(category);
            }

            categoryMap[category].push({ code, model, category });

        });

        categories.forEach(category => {

            const sectionId = 'cat-' + slugify(category);

            // Nav link
            const navLink = document.createElement('a');
            navLink.href = '#' + sectionId;
            navLink.textContent = `${category} (${categoryMap[category].length})`;
            nav.appendChild(navLink);

            // Section
            const section = document.createElement('div');
            section.className = 'category-section';
            section.id = sectionId;

            const title = document.createElement('h2');
            title.className = 'category-title';
            title.textContent = `${category} (${categoryMap[category].length})`;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'grid';
            section.appendChild(grid);

            categoryMap[category].forEach(item => {

                const productUrl =
                    `${PRODUCT_PAGE_URL}?model=${encodeURIComponent(item.model)}&category=${encodeURIComponent(item.category)}`;

                const card = document.createElement('div');
                card.className = 'card';

                const qrDiv = document.createElement('div');
                card.appendChild(qrDiv);

                const codeDiv = document.createElement('div');
                codeDiv.style.marginTop = '8px';
                codeDiv.style.fontSize = '12px';
                codeDiv.style.fontWeight = 'bold';
                codeDiv.style.wordBreak = 'break-word';
                codeDiv.textContent = item.code;
                card.appendChild(codeDiv);

                grid.appendChild(card);

                new QRCode(qrDiv,{
                    text: productUrl,
                    width:250,
                    height:250
                });

            });

            container.appendChild(section);

        });

    }
    catch(error){
        document.body.innerHTML = `
            <h2>Error Loading Products</h2>
            <p>${error.message}</p>
        `;
    }
}

loadProducts();

</script>
</body>
</html>
