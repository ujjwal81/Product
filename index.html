<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 12px rgba(0,0,0,.1);
}

.product-image{
    width:100%;
    max-height:500px;
    object-fit:contain;
    background:white;
    border-bottom:1px solid #eee;
}

.header{
    background:#202020;
    color:white;
    padding:20px;
}

.header h1{
    margin:0;
}

.content{
    padding:25px;
}

.price{
    font-size:32px;
    font-weight:bold;
    color:#0f766e;
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:20px;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.label{
    font-weight:bold;
}

.description{
    margin-top:25px;
    line-height:1.7;
}

.notes{
    margin-top:25px;
    background:#fff3cd;
    border:1px solid #ffe69c;
    border-radius:8px;
    padding:15px;
}

.variants{
    margin-top:30px;
}

.variant-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.variant-card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    cursor:pointer;
    text-align:center;
    transition:0.2s;
}

.variant-card:hover{
    transform:translateY(-2px);
}

.variant-card img{
    width:100%;
    height:140px;
    object-fit:contain;
    margin-bottom:10px;
}

.variant-color{
    font-weight:bold;
}

.variant-price{
    color:#0f766e;
    margin-top:5px;
}

.notfound{
    text-align:center;
    padding:80px 20px;
}

@media(max-width:600px){

    .row{
        flex-direction:column;
        gap:5px;
    }

    .price{
        font-size:26px;
    }

    .header h1{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div id="app">
    <div class="notfound">
        Loading Product...
    </div>
</div>

<script>

async function loadProduct(){

    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    try{

        const response = await fetch("products.json?v=" + Date.now());

        if(!response.ok){
            throw new Error("products.json not found");
        }

        const products = await response.json();

        const product = products[productId];

        if(!product){

            document.getElementById("app").innerHTML = `
                <div class="notfound">
                    <h2>Product Not Found</h2>
                </div>
            `;
            return;
        }

        document.getElementById("app").innerHTML = `
        <div class="container">

            <img
                id="mainImage"
                class="product-image"
                src="${product.image || ''}"
                alt="${product.name}"
                onerror="this.style.display='none'"
            >

            <div class="header">
                <h1>${product.name || ''}</h1>
            </div>

            <div class="content">

                <div id="mainPrice" class="price">
                    ${product.price || ''}
                </div>

                <div class="row">
                    <span class="label">Product Code</span>
                    <span>${product.code || ''}</span>
                </div>

                <div class="row">
                    <span class="label">Category</span>
                    <span>${product.category || ''}</span>
                </div>

                <div class="row">
                    <span class="label">Sub Category</span>
                    <span>${product.subSection || ''}</span>
                </div>

                ${product.size ? `
                <div class="row">
                    <span class="label">Size</span>
                    <span>${product.size}</span>
                </div>
                ` : ''}

                <div class="description">
                    <h3>Description</h3>
                    <p>${product.description || ''}</p>
                </div>

                ${
                    product.variants && product.variants.length
                    ?
                    `
                    <div class="variants">

                        <h3>Available Colors</h3>

                        <div class="variant-grid">

                            ${product.variants.map(v => `
                                <div class="variant-card"
                                     onclick="
                                        document.getElementById('mainImage').src='${v.image}';
                                        document.getElementById('mainPrice').innerText='${v.price}';
                                     ">

                                    <img src="${v.image}"
                                         onerror="this.style.display='none'">

                                    <div class="variant-color">
                                        ${v.color}
                                    </div>

                                    <div class="variant-price">
                                        ${v.price}
                                    </div>

                                </div>
                            `).join('')}

                        </div>

                    </div>
                    `
                    :
                    ''
                }

                ${
                    product.notes
                    ?
                    `
                    <div class="notes">
                        <strong>Notes</strong><br><br>
                        ${product.notes}
                    </div>
                    `
                    :
                    ''
                }

            </div>

        </div>
        `;

    }
    catch(error){

        document.getElementById("app").innerHTML = `
            <div class="notfound">
                <h2>Error Loading Product</h2>
                <p>${error.message}</p>
            </div>
        `;
    }

}

loadProduct();

</script>

</body>
</html>
