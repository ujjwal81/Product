<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<!-- PapaParse: used to parse the CSV data published from Google Sheets -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 12px rgba(0,0,0,.1);
}

.product-image{
    width:100%;
    max-height:500px;
    object-fit:contain;
    background:white;
    border-bottom:1px solid #eee;
}

.header{
    background:#202020;
    color:white;
    padding:20px;
}

.header h1{
    margin:0;
}

.content{
    padding:25px;
}

.price{
    font-size:32px;
    font-weight:bold;
    color:#0f766e;
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:20px;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.label{
    font-weight:bold;
}

.description{
    margin-top:25px;
    line-height:1.7;
}

.notes{
    margin-top:25px;
    background:#fff3cd;
    border:1px solid #ffe69c;
    border-radius:8px;
    padding:15px;
}

.variants{
    margin-top:30px;
}

.variant-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.variant-card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    cursor:pointer;
    text-align:center;
    transition:0.2s;
}

.variant-card:hover{
    transform:translateY(-2px);
}

.variant-card img{
    width:100%;
    height:140px;
    object-fit:contain;
    margin-bottom:10px;
}

.variant-color{
    font-weight:bold;
}

.variant-price{
    color:#0f766e;
    margin-top:5px;
}

.notfound{
    text-align:center;
    padding:80px 20px;
}

@media(max-width:600px){

    .row{
        flex-direction:column;
        gap:5px;
    }

    .price{
        font-size:26px;
    }

    .header h1{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div id="app">
    <div class="notfound">
        Loading Product...
    </div>
</div>

<script>

// ====== GOOGLE SHEETS CONFIG ======
//
// Sheet ID pulled from your link. Make sure sharing is set to
// "Anyone with the link" -> Viewer, then this URL pulls the sheet as CSV.
//
// If your product rows are on a tab OTHER than the first one, you need
// that tab's gid. Open the tab in the browser and look at the URL --
// it will end in "#gid=123456789". Put that number below.

const SHEET_ID = "1fLroSPYKrZYq-BNCiAfdjO5d5nZjfsjmMZ_xzVruonM";
const SHEET_GID = "2135797386";

const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`;

// Your sheet has one row per color variant. Rows are grouped into a
// single product page by "Model". URL for a product page is:
// ?model=<Model name, URL-encoded>

// ====== IMAGES ======
// If the "Image" column in your sheet is filled in, that URL is used.
// If it's EMPTY, the image path is built automatically from this folder
// using the row's Code, e.g. Code "VIVE-WHT-001" -> images/VIVE-WHT-001.png
//
// Leave as "images/" if your images folder sits next to this index.html
// in the same GitHub repo. Otherwise use the full URL to that folder.

const IMAGE_BASE_URL = "images/";
const IMAGE_EXTENSION = ".png";

function buildImagePath(code){
    return `${IMAGE_BASE_URL}${code}${IMAGE_EXTENSION}`;
}

// ====== END CONFIG ======

function parseCSV(csvText){

    const result = Papa.parse(csvText, {
        header:true,
        skipEmptyLines:true
    });

    return result.data;
}

async function fetchCSV(url){

    if(!url){
        return [];
    }

    const response = await fetch(url + (url.includes("?") ? "&" : "?") + "cachebust=" + Date.now());

    if(!response.ok){
        throw new Error("Could not load sheet: " + url);
    }

    const text = await response.text();

    return parseCSV(text);
}

async function loadProductsFromSheets(){

    const rows = await fetchCSV(SHEET_CSV_URL);

    const products = {};

    rows.forEach(row => {

        const model = (row["Model"] || "").trim();
        const color = (row["Color"] || "").trim();
        const code = (row["Code"] || "").trim();
        const sheetImage = (row["Image"] || "").trim();
        const resolvedImage = sheetImage || buildImagePath(code);

        if(!model) return;

        if(!products[model]){

            products[model] = {
                name: model,
                price: row["MRP (INR)"] || "",
                code: code,
                category: row["Category"] || "",
                subSection: row["Sub-Section"] || "",
                size: row["Size / Running Length"] || "",
                description: row["Description"] || "",
                notes: row["Notes / Must Order"] || "",
                image: resolvedImage,
                variants: []
            };

        }

        products[model].variants.push({
            color: color,
            code: code,
            price: row["MRP (INR)"] || "",
            image: resolvedImage
        });

    });

    return products;

}

async function loadProduct(){

    const params = new URLSearchParams(window.location.search);
    const modelParam = (params.get("model") || "").trim();

    try{

        const products = await loadProductsFromSheets();

        const match = Object.keys(products).find(
            name => name.toLowerCase() === modelParam.toLowerCase()
        );
        const product = match ? products[match] : null;

        if(!product){

            document.getElementById("app").innerHTML = `
                <div class="notfound">
                    <h2>Product Not Found</h2>
                </div>
            `;
            return;
        }

        document.getElementById("app").innerHTML = `
        <div class="container">

            <img
                id="mainImage"
                class="product-image"
                src="${product.image || ''}"
                alt="${product.name}"
                onerror="this.style.display='none'"
            >

            <div class="header">
                <h1>${product.name || ''}</h1>
            </div>

            <div class="content">

                <div id="mainPrice" class="price">
                    ${product.price || ''}
                </div>

                <div class="row">
                    <span class="label">Product Code</span>
                    <span id="mainCode">${product.code || ''}</span>
                </div>

                <div class="row">
                    <span class="label">Category</span>
                    <span>${product.category || ''}</span>
                </div>

                <div class="row">
                    <span class="label">Sub Category</span>
                    <span>${product.subSection || ''}</span>
                </div>

                ${product.size ? `
                <div class="row">
                    <span class="label">Size</span>
                    <span>${product.size}</span>
                </div>
                ` : ''}

                <div class="description">
                    <h3>Description</h3>
                    <p>${product.description || ''}</p>
                </div>

                ${
                    product.variants && product.variants.length
                    ?
                    `
                    <div class="variants">

                        <h3>Available Colors</h3>

                        <div class="variant-grid">

                            ${product.variants.map(v => `
                                <div class="variant-card"
                                     onclick="
                                        document.getElementById('mainImage').src='${v.image}';
                                        document.getElementById('mainPrice').innerText='${v.price}';
                                        document.getElementById('mainCode').innerText='${v.code}';
                                     ">

                                    <img src="${v.image}"
                                         onerror="this.style.display='none'">

                                    <div class="variant-color">
                                        ${v.color}
                                    </div>

                                    <div class="variant-price">
                                        ${v.price}
                                    </div>

                                </div>
                            `).join('')}

                        </div>

                    </div>
                    `
                    :
                    ''
                }

                ${
                    product.notes
                    ?
                    `
                    <div class="notes">
                        <strong>Notes</strong><br><br>
                        ${product.notes}
                    </div>
                    `
                    :
                    ''
                }

            </div>

        </div>
        `;

    }
    catch(error){

        document.getElementById("app").innerHTML = `
            <div class="notfound">
                <h2>Error Loading Product</h2>
                <p>${error.message}</p>
            </div>
        `;
    }

}

loadProduct();

</script>

</body>
</html>
