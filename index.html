<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,.1);
    overflow:hidden;
}

.header{
    background:#202020;
    color:white;
    padding:20px;
}

.content{
    padding:25px;
}

h1{
    margin:0;
}

.price{
    font-size:32px;
    font-weight:bold;
    color:#0f766e;
    margin:20px 0;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.label{
    font-weight:bold;
}

.description{
    margin-top:25px;
    line-height:1.6;
}

.notes{
    margin-top:25px;
    background:#fff3cd;
    padding:15px;
    border-radius:8px;
}

.notfound{
    text-align:center;
    padding:60px;
}
</style>

</head>
<body>

<div id="app">
<div class="notfound">Loading Product...</div>
</div>

<script>

async function loadProduct() {

    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    try {

        const response = await fetch("products.json");
        const products = await response.json();

        const product = products[productId];

        if(!product){

            document.getElementById("app").innerHTML = `
            <div class="notfound">
                <h2>Product Not Found</h2>
                <p>Please check the QR code.</p>
            </div>`;
            return;
        }

        document.getElementById("app").innerHTML = `
        <div class="container">

            <div class="header">
                <h1>${product.name}</h1>
            </div>

            <div class="content">

                <div class="price">${product.price}</div>

                <div class="row">
                    <span class="label">Product Code</span>
                    <span>${product.code}</span>
                </div>

                <div class="row">
                    <span class="label">Category</span>
                    <span>${product.category}</span>
                </div>

                <div class="row">
                    <span class="label">Sub Category</span>
                    <span>${product.subSection}</span>
                </div>

                <div class="description">
                    <h3>Description</h3>
                    <p>${product.description}</p>
                </div>

                ${
                    product.notes
                    ?
                    `<div class="notes">
                        <strong>Notes</strong><br>
                        ${product.notes}
                    </div>`
                    :
                    ''
                }

            </div>

        </div>`;
    }
    catch(error){

        document.getElementById("app").innerHTML = `
        <div class="notfound">
            <h2>Error Loading Products</h2>
            <p>${error}</p>
        </div>`;
    }
}

loadProduct();

</script>

</body>
</html>
